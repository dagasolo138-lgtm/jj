name: Step 8 lint capture

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/step8-lint-capture.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture lint
        run: npm run lint > tests/baselines/step8-lint-output.txt 2>&1 || true
      - name: Commit lint output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/step8-lint-output.txt
          git commit -m "chore(ui): capture step 8 lint diagnostics"
          git push
