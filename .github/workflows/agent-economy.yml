name: Agent economy

on:
  pull_request:
    paths:
      - src/engine/agentEconomy/**
      - src/components/EconomyMonitorTab.jsx
      - src/components/TabBar.jsx
      - src/components/tabConfig.js
      - src/components/TutorialPopup.jsx
      - src/components/TutorialHint.jsx
      - src/App.jsx
      - tests/unit/agentEconomy*.test.js
      - tests/stress/**
      - tests/baselines/agent-economy-step*.json
      - package.json
      - package-lock.json
      - .github/workflows/agent-economy.yml
      - .github/workflows/agent-economy-stress.yml
  push:
    branches: [main]
    paths:
      - src/engine/agentEconomy/**
      - src/components/EconomyMonitorTab.jsx
      - src/components/TabBar.jsx
      - src/components/tabConfig.js
      - src/components/TutorialPopup.jsx
      - src/components/TutorialHint.jsx
      - src/App.jsx
      - tests/unit/agentEconomy*.test.js
      - tests/stress/**
      - tests/baselines/agent-economy-step*.json
      - package.json
      - package-lock.json
      - .github/workflows/agent-economy.yml
      - .github/workflows/agent-economy-stress.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:agent-economy
      - run: npm run test:economy
      - run: npm run lint
      - run: npm run build
