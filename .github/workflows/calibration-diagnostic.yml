name: Calibration diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/calibration-diagnostic.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture agent economy tests
        run: npm run test:agent-economy > tests/baselines/calibration-diagnostic.txt 2>&1 || true
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/calibration-diagnostic.txt
          git commit -m "chore(test): capture calibration diagnostics"
          git push
