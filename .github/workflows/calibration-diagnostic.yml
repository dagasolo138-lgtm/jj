name: Calibration diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/calibration-diagnostic.yml

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture agent economy tests
        run: npm run test:agent-economy > calibration-diagnostic.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: calibration-diagnostic
          path: calibration-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
