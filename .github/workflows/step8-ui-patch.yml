name: Step 8 UI patch

on:
  push:
    branches: [main]
    paths:
      - scripts/step8UiPatch.mjs
      - .github/workflows/step8-ui-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/step8UiPatch.mjs
      - name: Commit integration
        run: |
          if git diff --quiet; then
            echo "No UI integration changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/components/TutorialPopup.jsx src/components/TutorialHint.jsx
          git commit -m "feat(ui): integrate economy monitoring tab"
          git push
