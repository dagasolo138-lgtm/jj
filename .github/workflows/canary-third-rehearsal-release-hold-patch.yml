name: Canary third rehearsal release-hold patch

on:
  push:
    branches: [main]
    paths:
      - scripts/patchCanaryThirdRehearsalReleaseHold.mjs
      - .github/workflows/canary-third-rehearsal-release-hold-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/patchCanaryThirdRehearsalReleaseHold.mjs
      - name: Commit patched rehearsal
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/runCanaryThirdCampaignRehearsal.mjs
          git commit -m "fix(agent-economy): report third campaign release holds"
          git push
