name: Canary pilot integration

on:
  push:
    branches: [main]
    paths:
      - scripts/apply_canary_pilot_patch.py
      - .github/workflows/canary-pilot-integration.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply canary pilot patch
        run: python scripts/apply_canary_pilot_patch.py
      - name: Verify pilot integration
        run: |
          npm run test:agent-economy
          npm run test:economy
          npm run lint
          npm run build
      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests package.json
          git commit -m "feat(agent-economy): integrate controlled canary pilot"
          git push
