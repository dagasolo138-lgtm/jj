name: Calibration mechanics patch

on:
  push:
    branches: [main]
    paths:
      - scripts/applyCalibrationMechanicsPatch.mjs
      - .github/workflows/calibration-mechanics-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/applyCalibrationMechanicsPatch.mjs
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No patch changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/engine/agentEconomy/dailySimulation.js \
            src/engine/agentEconomy/welfareSystem.js \
            src/engine/agentEconomy/orderIntentSystem.js \
            src/engine/agentEconomy/buildingProductionSystem.js
          git commit -m "feat(agent-economy): add subsistence and supply clearing"
          git push
