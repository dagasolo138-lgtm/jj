name: Canary four-quarter extension reporting patch

on:
  push:
    branches: [main]
    paths:
      - scripts/patchCanaryFourQuarterExtensionReporting.mjs
      - .github/workflows/canary-four-quarter-extension-reporting-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/patchCanaryFourQuarterExtensionReporting.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/runCanaryFourQuarterExtensionRehearsal.mjs
          git diff --cached --quiet && exit 0
          git commit -m "fix(agent-economy): report extension population drift"
          git push
