name: Default market diagnostic

on:
  push:
    branches: [main]
    paths:
      - tests/calibration/runDefaultMarketDiagnostic.js
      - .github/workflows/default-market-diagnostic.yml

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node tests/calibration/runDefaultMarketDiagnostic.js
      - uses: actions/upload-artifact@v4
        with:
          name: default-market-diagnostic
          path: artifacts/agent-economy-default-market-diagnostic.json
          retention-days: 7
