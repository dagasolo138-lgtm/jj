name: Fractional daily food consumption patch

on:
  push:
    branches: [main]
    paths:
      - scripts/patchFractionalDailyFoodConsumption.mjs
      - .github/workflows/fractional-daily-food-consumption-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/patchFractionalDailyFoodConsumption.mjs
      - name: Capture agent economy tests
        run: |
          mkdir -p artifacts
          set +e
          npm run test:agent-economy > artifacts/fractional-consumption-tests.log 2>&1
          status=$?
          cat artifacts/fractional-consumption-tests.log
          echo "$status" > artifacts/test-exit-code.txt
          exit "$status"
      - run: npm run test:economy
      - run: npm run lint
      - run: npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/engine/agentEconomy/consumptionSystem.js \
            tests/unit/agentEconomyConsumption.test.js
          git diff --cached --quiet && exit 0
          git commit -m "fix(agent-economy): use fractional daily food consumption"
          git push
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fractional-consumption-test-output
          path: artifacts/
          if-no-files-found: error
          retention-days: 7
