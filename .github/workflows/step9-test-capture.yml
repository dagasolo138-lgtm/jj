name: Step 9 test capture

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/step9-test-capture.yml

permissions:
  contents: write

env:
  CAPTURE_VERSION: "3"

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture lint
        run: npm run lint > tests/baselines/step9-test-output.txt 2>&1 || true
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/step9-test-output.txt
          git commit -m "chore(test): capture step 9 diagnostics v${CAPTURE_VERSION}"
          git push
