name: Import project snapshot

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-project.yml

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch exact uploaded project snapshot
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/goldbar123467/The-Lords-Ledger.git /tmp/source
          git -C /tmp/source checkout 47570f9caa5696c7369d88a42ae87171b78cd68b
          rm -rf /tmp/source/.git

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/source/. .

      - name: Commit imported files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Import The Lord's Ledger project"
          git push origin HEAD:main
