name: Emergency rationing patch

on:
  push:
    branches: [main]
    paths:
      - scripts/applyEmergencyRationingPatch.mjs
      - .github/workflows/emergency-rationing-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/applyEmergencyRationingPatch.mjs
      - name: Commit emergency rationing integration
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/engine/agentEconomy/dailySimulation.js \
            src/engine/agentEconomy/householdFactory.js \
            src/engine/agentEconomy/householdUtils.js \
            src/engine/agentEconomy/index.js
          git commit -m "feat(agent-economy): integrate emergency food rationing"
          git push
