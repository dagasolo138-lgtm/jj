name: Campaign lint diagnostics

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/campaign-lint-diagnostics.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture lint output
        shell: bash
        run: |
          set +e
          npm run lint > campaign-lint-error.txt 2>&1
          status=$?
          tail -120 campaign-lint-error.txt > campaign-lint-tail.txt
          mv campaign-lint-tail.txt campaign-lint-error.txt
          echo "LINT_EXIT_STATUS=$status" >> campaign-lint-error.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add campaign-lint-error.txt
          git commit -m "chore(agent-economy): record campaign lint error"
          git push
