name: Step 8 lint fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/step8-lint-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/EconomyMonitorTab.jsx')
          text = path.read_text()
          text = text.replace('import { useMemo } from "react";', 'import { createElement, useMemo } from "react";')
          text = text.replace('<Icon size={15} color={toneColor} strokeWidth={1.7} />', '{createElement(Icon, { size: 15, color: toneColor, strokeWidth: 1.7 })}')
          path.write_text(text)
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/EconomyMonitorTab.jsx
          git commit -m "fix(ui): satisfy economy monitor lint"
          git push
