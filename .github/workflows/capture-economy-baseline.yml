name: Capture legacy economy baseline

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/capture-economy-baseline.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture baseline from current engine
        run: npm run test:economy:baseline:update

      - name: Verify captured baseline
        run: npm run test:economy

      - name: Commit frozen baseline
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/economy-v1.json
          git diff --cached --quiet && exit 0
          git commit -m "test(economy): freeze legacy 40-turn baseline"
          git push origin HEAD:main

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
