name: Capture legacy economy baseline

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/capture-economy-baseline.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture baseline from current engine
        run: npm run test:economy:baseline:update

      - name: Verify baseline
        run: npm run test:economy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install permanent baseline check
        shell: bash
        run: |
          cat > .github/workflows/economy-baseline.yml <<'WORKFLOW'
          name: Economy baseline

          on:
            pull_request:
              paths:
                - src/engine/economyEngine.js
                - src/engine/synergyEngine.js
                - src/data/economy.js
                - src/data/buildings.js
                - tests/baselines/**
                - tests/unit/economyBaseline.test.js
                - package.json
                - package-lock.json
            push:
              branches: [main]
              paths:
                - src/engine/economyEngine.js
                - src/engine/synergyEngine.js
                - src/data/economy.js
                - src/data/buildings.js
                - tests/baselines/**
                - tests/unit/economyBaseline.test.js
                - package.json
                - package-lock.json

          jobs:
            verify:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm
                - run: npm ci
                - run: npm run test:economy
                - run: npm run lint
                - run: npm run build
          WORKFLOW
          rm .github/workflows/capture-economy-baseline.yml

      - name: Commit frozen baseline
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/baselines/economy-v1.json .github/workflows/economy-baseline.yml .github/workflows/capture-economy-baseline.yml
          git commit -m "test(economy): freeze legacy 40-turn baseline"
          git push origin HEAD:main
