name: Canary outcome fix

on:
  push:
    branches: [main]
    paths:
      - scripts/applyCanaryOutcomeFix.mjs
      - .github/workflows/canary-outcome-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/applyCanaryOutcomeFix.mjs
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/engine/agentEconomy/liveStateAdapter.js \
            src/engine/agentEconomy/canaryTransactionSystem.js
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "fix(agent-economy): normalize canary game-over outcomes"
          git push
