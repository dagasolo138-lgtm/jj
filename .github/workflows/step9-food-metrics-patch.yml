name: Step 9 food metric patch

on:
  push:
    branches: [main]
    paths:
      - scripts/step9FoodMetricsPatch.mjs
      - .github/workflows/step9-food-metrics-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/step9FoodMetricsPatch.mjs
      - name: Commit food metrics
        run: |
          if git diff --quiet; then
            echo "No metric changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/engine/agentEconomy/dailySimulation.js src/engine/agentEconomy/householdFactory.js src/engine/agentEconomy/householdUtils.js
          git commit -m "feat(agent-economy): track fulfilled food demand"
          git push
