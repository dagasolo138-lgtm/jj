name: Finalize economy baseline

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-economy-baseline.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Verify frozen economy baseline
        id: economy
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run test:economy

      - name: Lint repository
        id: lint
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lint

      - name: Build production bundle
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run build

      - name: Record results and install permanent check
        shell: bash
        run: |
          cat > tests/baselines/validation.json <<EOF
          {
            "validatedCommit": "${GITHUB_SHA}",
            "nodeVersion": "20",
            "npmCi": "${{ steps.install.outcome }}",
            "economyBaseline": "${{ steps.economy.outcome }}",
            "lint": "${{ steps.lint.outcome }}",
            "build": "${{ steps.build.outcome }}"
          }
          EOF

          cat > .github/workflows/economy-baseline.yml <<'WORKFLOW'
          name: Economy baseline

          on:
            pull_request:
              paths:
                - src/engine/economyEngine.js
                - src/engine/synergyEngine.js
                - src/data/economy.js
                - src/data/buildings.js
                - tests/baselines/**
                - tests/unit/economyBaseline.test.js
                - package.json
                - package-lock.json
            push:
              branches: [main]
              paths:
                - src/engine/economyEngine.js
                - src/engine/synergyEngine.js
                - src/data/economy.js
                - src/data/buildings.js
                - tests/baselines/**
                - tests/unit/economyBaseline.test.js
                - package.json
                - package-lock.json

          jobs:
            verify:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm
                - run: npm ci
                - run: npm run test:economy
                - run: npm run lint
                - run: npm run build
          WORKFLOW

          rm -f .github/workflows/capture-economy-baseline.yml
          rm -f .github/workflows/finalize-economy-baseline.yml

      - name: Commit final baseline infrastructure
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "ci(economy): finalize legacy baseline checks"
          git push origin HEAD:main

      - name: Fail if validation failed
        if: steps.install.outcome != 'success' || steps.economy.outcome != 'success' || steps.lint.outcome != 'success' || steps.build.outcome != 'success'
        run: exit 1
