name: Integrate agent economy step 2

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/integrate-agent-economy-step2.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Connect household reducer wrapper
        run: node scripts/patch-agent-economy-step2.mjs

      - name: Capture unit test output
        id: unit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee tests/baselines/agent-economy-step2-debug.txt

      - name: Commit diagnostic output
        if: steps.unit.outcome != 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f tests/baselines/agent-economy-step2-debug.txt
          git commit -m "test(agent-economy): capture step 2 failure"
          git push origin HEAD:main

      - name: Stop after failed tests
        if: steps.unit.outcome != 'success'
        run: exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Record validation
        run: |
          rm -f tests/baselines/agent-economy-step2-debug.txt
          cat > tests/baselines/agent-economy-step2-validation.json <<EOF
          {
            "validatedCommit": "${GITHUB_SHA}",
            "nodeVersion": "24",
            "unitTests": "success",
            "lint": "success",
            "build": "success",
            "liveEconomyChanged": false,
            "agentEconomyEnabled": false,
            "shadowMode": true,
            "integration": "reducer-wrapper"
          }
          EOF

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx tests/unit/agentEconomyHouseholds.test.js tests/baselines/agent-economy-step2-validation.json
          git add -u tests/baselines/agent-economy-step2-debug.txt || true
          git diff --cached --quiet && exit 0
          git commit -m "feat(agent-economy): activate household state wrapper"
          git push origin HEAD:main

# Retry after fixing the Node 24 unit-test glob.
