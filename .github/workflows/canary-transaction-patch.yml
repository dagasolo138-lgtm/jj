name: Canary transaction patch

on:
  push:
    branches: [main]
    paths:
      - scripts/applyCanaryTransactionPatch.mjs
      - .github/workflows/canary-transaction-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply patch
        run: |
          set +e
          node scripts/applyCanaryTransactionPatch.mjs > /tmp/canary-patch.log 2>&1
          status=$?
          cat /tmp/canary-patch.log
          if [ $status -ne 0 ]; then
            cp /tmp/canary-patch.log canary-patch-error.txt
            git checkout -- src/engine/agentEconomy || true
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add canary-patch-error.txt
            git commit -m "chore(agent-economy): capture canary patch error"
            git push
            exit 0
          fi
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No patch changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/engine/agentEconomy/engineControlSystem.js \
            src/engine/agentEconomy/liveStateAdapter.js \
            src/engine/agentEconomy/canaryTransactionSystem.js \
            src/engine/agentEconomy/householdFactory.js \
            src/engine/agentEconomy/integratedGameReducer.js \
            src/engine/agentEconomy/index.js
          git commit -m "feat(agent-economy): integrate atomic canary write-back"
          git push
