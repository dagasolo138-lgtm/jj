name: Canary pilot cleanup

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/canary-pilot-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove temporary integration tooling
        run: |
          rm -f \
            scripts/apply_canary_pilot_patch.py \
            .github/workflows/canary-pilot-integration.yml \
            .github/workflows/canary-pilot-cleanup.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(agent-economy): remove canary pilot tooling"
          git push
